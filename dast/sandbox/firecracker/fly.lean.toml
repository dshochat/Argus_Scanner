# Argus DAST Firecracker sandbox — Fly.io app config (`lean` tier,
# v1.8 P2b, renamed from `minimal`).
#
# This is a Fly Machines app (no services, no public IPs, no autoscaling).
# Each plan execution creates a one-shot ephemeral machine via the Fly
# Machines API with `auto_destroy=true`. Per-machine resources (CPU,
# memory, network) are set at the API call site, not here.
#
# Why no services / no http handlers: this app receives ZERO inbound
# traffic. Plans are pushed in via env vars at machine-creation time;
# results come back via stdout / Fly logs API. Inbound exposure would
# violate the sandbox safety boundary.
#
# App-name note: ``argus-dast-sandbox`` below is the upstream-Argus
# default. Fly app names are globally unique across all Fly accounts,
# so self-hosters MUST pick their own name. The deploy scripts
# (preflight.sh, build_and_push_multi.sh) pass ``--app $ARGUS_DAST_FLY_APP``
# to ``flyctl deploy``, which overrides the value below for the
# deploy operation. For ``flyctl status`` / ``flyctl logs`` without
# ``--app``, edit this line to match your override OR always pass
# ``--app $ARGUS_DAST_FLY_APP`` to those commands too.

app = "argus-dast-sandbox"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.lean"

# No `[[services]]` blocks — app has no inbound network surface.
# No `[[http_service]]` blocks — same reason.
# No `[[mounts]]` — no persistent state across machine lifetimes.
# No `[experimental] auto_rollback` — deploys must be deliberate.
