# Argus DAST Firecracker sandbox — `rich_python` tier (v1.8 P2b,
# renamed from `networked`).
#
# Same Fly app as the lean/ml_tools tiers; differs only in the
# Dockerfile reference. Use via `flyctl deploy --config fly.rich_python.toml`.
#
# App-name note: self-hosters MUST override the default below. Deploy
# scripts pass ``--app $ARGUS_DAST_FLY_APP`` which overrides. See
# fly.lean.toml for the full explanation.

app = "argus-dast-sandbox"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.rich_python"
