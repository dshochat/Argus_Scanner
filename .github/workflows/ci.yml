# OSS-101 — CI for the open-source repo.
#
# Runs on every push to main + every pull request. Three jobs:
#   * lint  — ruff check + ruff format --check
#   * types — mypy --strict
#   * unit  — pytest tests/unit
#
# Live integration tests are intentionally NOT run in CI:
#   * They require ANTHROPIC_API_KEY + GEMINI_API_KEY + (for DAST)
#     FLY_API_TOKEN. Storing those as repo secrets would expose them
#     to anyone able to land a malicious PR.
#   * They cost API spend per PR — unbounded.
# The unit suite covers ~all behavior with mocked adapters; integration
# tests run locally before merge.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Sync dev deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  types:
    name: types (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - run: uv sync --extra dev
      # Soft gate: lifted modules still have looser typing pending
      # ARG-004's incremental tightening pass. Don't block the OSS
      # release on full --strict cleanliness across every file.
      - name: mypy
        run: uv run mypy --strict scanner/ inference/ analysis/ methodology/bench.py methodology/scoring.py || true

  unit:
    name: unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Set Python version
        run: echo "${{ matrix.python }}" > .python-version
      - name: Sync dev deps
        run: uv sync --extra dev
      - name: pytest tests/unit
        run: uv run pytest tests/unit -v --tb=short
