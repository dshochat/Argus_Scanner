# Release workflow — fires on tag pushes (vMAJOR.MINOR.PATCH).
# Builds + publishes the wheel/sdist to PyPI and the Docker image to GHCR.
#
# PyPI auth uses Trusted Publishing (OIDC) — no API token secret needed.
# Configure on PyPI under Account → Publishing → Add pending publisher:
#   PyPI project name:  argus-ai-scanner
#   Owner:              dshochat
#   Repository name:    Argus_Scanner
#   Workflow filename:  release.yml
#   Environment name:   (blank, or 'pypi' for an approval gate)
#
# GHCR uses GITHUB_TOKEN automatically — no extra secret needed.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mandatory for PyPI Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Sync deps
        run: uv sync --extra dev
      - name: Build wheel + sdist
        run: uv build
      - name: Inspect built artifacts
        run: ls -la dist/
      # Trusted Publishing: PyPI exchanges the GitHub OIDC token for a
      # short-lived API token automatically. No secret on this side.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # attestations = signed provenance attestations (Sigstore-backed),
          # which PyPI displays alongside the artefact. Free + automatic.
          attestations: true

  ghcr:
    name: Build + push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/argus_scanner:latest
            ghcr.io/${{ github.repository_owner }}/argus_scanner:${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.title=argus-ai-scanner
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
